<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Cafetería - Reportes</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- CSS externo -->
    <link rel="stylesheet" href="{{ url_for('static', filename='reportes.css') }}">
</head>

<body>
    <nav class="navbar navbar-dark">
        <span class="navbar-brand mb-0 h1">Cafetería UNAB 2026</span>
    </nav>

    <div class="container text-center mt-5">
        <p class="welcome-text">Panel de Reportes</p>

        <!-- Botón Home arriba -->
        <div class="row mb-4">
            <div class="col-12">
                <a href="/" class="btn btn-custom btn-lg w-100">
                    <img src="{{ url_for('static', filename='icon_home.png') }}" class="icon" alt="Home">
                    Volver al Home
                </a>
            </div>
        </div>

        <!-- Tarjetas de reportes -->
        <div class="menu-container mx-auto">
            <div class="row">
                <!-- Tarjeta Productos sin stock -->
                <div class="col-md-6 col-12 mb-4">
                    <a href="/reportes/productos" class="card text-center text-white h-100 text-decoration-none">
                        <div class="card-body">
                            <img src="{{ url_for('static', filename='icon_SinStock.png') }}" class="icon-card" alt="Productos sin stock">
                            <h5 class="card-title mt-2">Productos sin stock</h5>
                            <p class="fw-bold">Cantidad: {{ productos|length }}</p>
                            <p class="card-text">Consulta los productos agotados o no disponibles en la cafetería.</p>
                        </div>
                    </a>
                </div>

                <!-- Tarjeta Ventas del día -->
                <div class="col-md-6 col-12 mb-4">
                    <a href="/reportes/ventas" class="card text-center text-white h-100 text-decoration-none">
                        <div class="card-body">
                            <img src="{{ url_for('static', filename='icon_VentasDelDia.png') }}" class="icon-card" alt="Ventas del día">
                            <h5 class="card-title mt-2">Ventas del día</h5>
                            <p class="fw-bold">Cantidad: {{ total_ventas }}</p>
                            <p class="card-text">Revisa todas las ventas realizadas hoy con detalle de productos.</p>
                        </div>
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
