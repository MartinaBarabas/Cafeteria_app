<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cafetería - Registrar Venta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='venta.css') }}">
</head>
<body>
    <div class="overlay">
        <nav class="navbar navbar-dark">
            <span class="navbar-brand mb-0 h1">Cafetería UNAB 2026</span>
        </nav>

        <div class="container mt-5">
            <h2 class="text-center mb-4">Registrar Venta</h2>

            <!-- Alertas -->
            {% if success %}
            <div class="alert alert-success" role="alert">
                Venta registrada con éxito
            </div>
            <script>
                // limpiar tabla y variables después de éxito
                productosVenta = [];
                total = 0;
                document.getElementById("tablaVenta").querySelector("tbody").innerHTML = "";
                document.getElementById("totalVenta").textContent = "$0.00";
            </script>
            {% endif %}

            {% if error %}
            <div class="alert alert-danger" role="alert">
                {{ error }}
            </div>
            {% endif %}

            <!-- Formulario -->
            <form id="ventaForm" method="POST" action="/venta" class="mb-4">
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="producto_id" class="form-label">Producto</label>
                        <select class="form-select" id="producto_id">
                            {% for producto in productos %}
                            <option value="{{ producto[0] }}"
                                    data-precio="{{ producto[3] }}"
                                    data-stock="{{ producto[4] }}">
                                {{ producto[1] }} (Stock: {{ producto[4] }})
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label for="cantidad" class="form-label">Cantidad</label>
                        <input type="number" class="form-control" id="cantidad" min="1">
                    </div>
                    <div class="col-md-3 d-flex align-items-end">
                        <button type="button" class="btn btn-custom w-100" onclick="agregarProducto()">
                            Agregar
                        </button>
                    </div>
                </div>

                <!-- Campo oculto -->
                <input type="hidden" id="productos_json" name="productos_json">

                <!-- Tabla -->
                <table class="table table-striped table-bordered text-center" id="tablaVenta">
                    <thead class="table-dark">
                        <tr>
                            <th>Producto</th>
                            <th>Cantidad</th>
                            <th>Precio Unitario</th>
                            <th>Subtotal</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                    <tfoot>
                        <tr>
                            <td colspan="3" class="text-end"><strong>Total:</strong></td>
                            <td id="totalVenta">$0.00</td>
                        </tr>
                    </tfoot>
                </table>

                <!-- Botones -->
<div class="d-flex justify-content-between mt-4">
    <button type="submit" class="btn btn-custom">
        <img src="{{ url_for('static', filename='icon_RegistrarVenta.png') }}" class="icon" alt="Venta">
        Registrar Venta
    </button>
    <a href="/" class="btn btn-custom">
        <img src="{{ url_for('static', filename='icon_home.png') }}" class="icon" alt="Home">
        Volver al Home
    </a>
    <a href="/inventario" class="btn btn-custom">
        <img src="{{ url_for('static', filename='icon_inventarioVentas.png') }}" class="icon" alt="Inventario">
        Volver al Inventario
    </a>
</div>
    </form>
    <script>
        let total = 0;
        let productosVenta = [];

        function agregarProducto() {

            const select = document.getElementById("producto_id");

            const cantidad = parseInt(
                document.getElementById("cantidad").value
            );

            const precio = parseFloat(
                select.selectedOptions[0].dataset.precio
            );

            const stock = parseInt(
                select.selectedOptions[0].dataset.stock
            );

            const nombre = select.selectedOptions[0].text.split(" (Stock:")[0];

            if (!cantidad || cantidad <= 0) {
                alert("Ingrese una cantidad válida");
                return;
            }

            if (cantidad > stock) {
                alert(
                    "Stock insuficiente.\n\n" +
                    "Disponible: " + stock +
                    "\nSolicitado: " + cantidad
                );
                return;
            }

            // Actualizar stock visual del producto
            const nuevoStock = stock - cantidad;

            select.selectedOptions[0].dataset.stock = nuevoStock;

            const nombreProducto =
                select.selectedOptions[0].text.split(" (Stock:")[0];

            select.selectedOptions[0].text =
                nombreProducto + " (Stock: " + nuevoStock + ")";

            if (nuevoStock === 0) {
                select.selectedOptions[0].disabled = true;
            }
            const subtotal = precio * cantidad;
            total += subtotal;

            productosVenta.push({
                id: select.value,
                cantidad: cantidad
            });

            const tabla = document
                .getElementById("tablaVenta")
                .querySelector("tbody");

            const fila = document.createElement("tr");

            fila.innerHTML = `
                <td>${nombre}</td>
                <td>${cantidad}</td>
                <td>$${precio.toFixed(2)}</td>
                <td>$${subtotal.toFixed(2)}</td>
            `;

            tabla.appendChild(fila);

            document.getElementById("totalVenta").textContent =
                "$" + total.toFixed(2);

            document.getElementById("cantidad").value = "";
        }

            document.getElementById("ventaForm").addEventListener("submit", function (e) {

                if (productosVenta.length === 0) {
                    e.preventDefault();
                    alert("Debe agregar al menos un producto.");
                    return;
                }

                document.getElementById("productos_json").value =
                    JSON.stringify(productosVenta);
            });
    </script>
   
</body>
</html>
