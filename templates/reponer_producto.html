<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Cafetería - Reponer Producto</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS externo -->
    <link rel="stylesheet" href="{{ url_for('static', filename='editar_producto.css') }}">
</head>

<body>
    <nav class="navbar navbar-dark">
        <span class="navbar-brand mb-0 h1">Cafetería UNAB 2026</span>
    </nav>

    <div class="container text-center mt-5">
        <p class="welcome-text">Reponer stock de producto</p>

        <div class="menu-container mx-auto text-start">
            <form method="POST">

                <div class="mb-3">
                    <label for="nombre" class="form-label">Nombre</label>
                    <input type="text"
                           class="form-control"
                           id="nombre"
                           value="{{ producto.nombre }}"
                           readonly>
                </div>

                <div class="mb-3">
                    <label for="stock_actual" class="form-label">Stock Actual</label>
                    <input type="number"
                           class="form-control"
                           id="stock_actual"
                           value="{{ producto.stock }}"
                           readonly>
                </div>

                <div class="mb-3">
                    <label for="cantidad" class="form-label">Cantidad a Reponer</label>
                    <input type="number"
                           class="form-control"
                           id="cantidad"
                           name="cantidad"
                           min="1"
                           required>
                </div>

                <div class="d-flex justify-content-between">
                    <button type="submit" class="btn btn-custom">
                        Reponer Stock
                    </button>

                    <a href="/inventario" class="btn btn-secondary">
                        Volver
                    </a>
                </div>

            </form>
        </div>
    </div>
</body>

</html>
